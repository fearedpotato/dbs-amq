<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — DBS</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { visibility: hidden; }
  </style>
</head>
<body class="page">
<nav class="navbar">
  <a class="navbar-brand" href="dashboard.html">DBS<span>.</span></a>
  <div class="navbar-links">
    <span id="navUsername" style="color: var(--text-muted); font-size: 0.9rem;"></span>
    <button class="btn btn-ghost" onclick="auth.logout()" style="padding: 0.4rem 1rem; font-size: 0.88rem;">Sign out</button>
  </div>
</nav>

<main class="main-content">
  <div class="dashboard-header">
    <h1>Hey, <span id="username" style="color: var(--accent);">...</span> 👋</h1>
    <p>subtext subtext subtext subtext subtext </p>
    <div style="margin-top: 0.6rem;">
      <span class="badge" id="verifiedBadge"></span>
    </div>
  </div>

  <div class="cards-grid">
    <div class="card" style="cursor:pointer" onclick="alert('Coming soon!')">
      <div class="card-icon">🎮</div>
      <h3>Play</h3>
      <p>Start a new game and guess anime openings from your list</p>
    </div>
    <div class="card">
      <div class="card-icon">📊</div>
      <h3>Stats</h3>
      <p>View your scores and game history</p>
    </div>
    <div class="card">
      <div class="card-icon">⚙️</div>
      <h3>Settings</h3>
      <p>Manage your account and preferences</p>
    </div>
  </div>
</main>

<script src="auth.js"></script>
<script>
  if (!auth.isLoggedIn()) {
    window.location.href = 'login.html';                  // Dashboard remains hidden until user is logged in
  } else {
    document.body.style.visibility = 'visible';

    const user = auth.getUser();

    document.getElementById('username').textContent = user?.username || '';
    document.getElementById('navUsername').textContent = user?.username || '';

    const badge = document.getElementById('verifiedBadge');
    if (user?.isVerified) {
      badge.textContent = '✓ Verified';
      badge.className = 'badge badge-success';
    } else {
      badge.textContent = '⚠ Email not verified';
      badge.className = 'badge badge-warning';
    }

    apiFetch('/auth/me').then(freshUser => {
      auth.save(auth.getToken(), freshUser);
      document.getElementById('username').textContent = freshUser.username;
      document.getElementById('navUsername').textContent = freshUser.username;

      if (freshUser.isVerified) {
        badge.textContent = '✓ Verified';
        badge.className = 'badge badge-success';
      } else {
        badge.textContent = '⚠ Email not verified';
        badge.className = 'badge badge-warning';
      }
    }).catch(() => auth.logout());
  }
</script>
</body>
</html>
