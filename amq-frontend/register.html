<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — DBS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <a class="auth-logo" href="#">DBS<span>.</span></a>
    <h1>Create account</h1>
    <p class="subtitle">Join and start guessing anime openings</p>

    <div class="alert" id="alert"></div>

    <form id="registerForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Username" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required/>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn" data-label="Create account">Create account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  auth.requireGuest();

  const form = document.getElementById('registerForm');
  const alertEl = document.getElementById('alert');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    setLoading(submitBtn, true);

    try {
      await apiFetch('/auth/register', {
        method: 'POST',
        body: JSON.stringify({
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        })
      });

      showAlert(alertEl, 'Account created! Check your email to verify your account.', 'success');
      setTimeout(() => window.location.href = 'login.html', 3000);
    } catch (err) {
      showAlert(alertEl, err.message);
      setLoading(submitBtn, false);
    }
  });
</script>
</body>
</html>
