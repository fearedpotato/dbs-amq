<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — DBS</title>
  <script>if (!localStorage.getItem('token')) window.location.replace('login.html');</script>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { visibility: hidden; }
  </style>
</head>
<body class="page">

<main class="main-content">
  <div class="dashboard-header">
    <h1>Hey, <span id="username" style="color: var(--accent);">...</span> 👋</h1>
    <p>abcdefghijklmnopqrstuvwxyz</p>
    <div style="margin-top: 0.6rem;">
      <span class="badge" id="verifiedBadge"></span>
    </div>
  </div>

  <div class="cards-grid">
    <div class="card" style="cursor:pointer" onclick="window.location.href='game.html'">
      <div class="card-icon">🎮</div>
      <h3>Anime Music Quiz</h3>
      <p>Guess the anime from its opening song</p>
    </div>
    <div class="card">
      <div class="card-icon">📊</div>
      <h3>Stats</h3>
      <p>View your scores and game history</p>
    </div>
  </div>
</main>

<script src="auth.js"></script>
<script src="navbar.js?v=malfix2"></script>
<script>
  renderNavbar();
  document.body.style.visibility = 'visible';

  const cachedUser = auth.getUser();
  if (cachedUser) updateUI(cachedUser);

  apiFetch('/auth/me').then(freshUser => {
    auth.save(auth.getToken(), freshUser);
    updateUI(freshUser);
  }).catch(() => auth.logout());

  const params = new URLSearchParams(window.location.search);
  if (params.get('mal_connected') === 'true') {
    history.replaceState({}, '', '/dashboard.html');
    openSettings();
  }
  if (params.get('error') === 'mal_failed') {
    history.replaceState({}, '', '/dashboard.html');
    alert('Failed to connect MAL account. Please try again.');
  }

  function updateUI(user) {
    if (!user) return;

    document.getElementById('username').textContent = user.nickname || user.username || '';

    const badge = document.getElementById('verifiedBadge');
    if (badge) {
      badge.textContent = user.isVerified ? '✓ Verified' : '⚠ Email not verified';
      badge.className = user.isVerified ? 'badge badge-success' : 'badge badge-warning';
    }

    updateNavbarUI(user);
  }
</script>
</body>
</html>
