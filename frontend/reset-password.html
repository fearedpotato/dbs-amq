<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set New Password - DBS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <a class="auth-logo" href="#">DBS<span>.</span></a>
    <h1>Set a new password</h1>
    <p class="subtitle" id="subtitle">Choose a new password for your account.</p>

    <div class="alert" id="alert"></div>

    <form id="resetForm">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="password" placeholder="********" autocomplete="new-password" required/>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="********" autocomplete="new-password" required/>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn" data-label="Reset password">Reset password</button>
    </form>

    <div class="auth-footer">
      Back to <a href="/login">Sign in</a>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  auth.requireGuest();

  const alertEl = document.getElementById('alert');
  const form = document.getElementById('resetForm');
  const submitBtn = document.getElementById('submitBtn');
  const token = new URLSearchParams(window.location.search).get('token');

  if (!token) {
    form.style.display = 'none';
    showAlert(alertEl, 'Invalid reset link');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!token) return;

    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
      showAlert(alertEl, 'Passwords do not match');
      return;
    }

    setLoading(submitBtn, true);

    try {
      await apiFetch('/auth/reset-password', {
        method: 'POST',
        body: JSON.stringify({ token, password, confirmPassword })
      });

      showAlert(alertEl, 'Password reset successfully. Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/login', 1500);
    } catch (err) {
      showAlert(alertEl, err.message);
      setLoading(submitBtn, false);
    }
  });
</script>
</body>
</html>
