<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - DBS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <a class="auth-logo" href="#">DBS<span>.</span></a>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue</p>

    <div class="alert" id="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Username or Email</label>
        <input type="text" id="identifier" placeholder="Username / Email" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="********" autocomplete="current-password" required/>
      </div>
      <div class="auth-row-link">
        <a href="forgot.html">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn" data-label="Sign in">Sign in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  auth.requireGuest();

  const form = document.getElementById('loginForm');
  const alert = document.getElementById('alert');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    setLoading(submitBtn, true);

    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          identifier: document.getElementById('identifier').value,
          password: document.getElementById('password').value,
        })
      });

      const token = data.token;
      localStorage.setItem('token', token);
      const user = await apiFetch('/auth/me');
      auth.save(token, user);

      window.location.href = 'dashboard.html';
    } catch (err) {
      showAlert(alert, err.message);
      setLoading(submitBtn, false);
    }
  });
</script>
</body>
</html>
