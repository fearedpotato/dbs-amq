<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Anime Music Quiz - DBS</title>
    <script>if (!localStorage.getItem('token')) window.location.replace('login.html');</script>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="/game-app/assets/game-client.css"/>
    <style>
        body { visibility: hidden; }
    </style>
</head>
<body class="page">

<main class="main-content">
    <div id="game-root">
        <p style="color: var(--text-muted);">Loading game client...</p>
    </div>
</main>

<script src="auth.js"></script>
<script src="navbar.js"></script>
<script>
    renderNavbar();
    document.body.style.visibility = 'visible';

    const cachedUser = auth.getUser();
    if (cachedUser) updateNavbarUI(cachedUser);

    apiFetch('/auth/me').then(freshUser => {
        auth.save(auth.getToken(), freshUser);
        updateNavbarUI(freshUser);
    }).catch(() => auth.logout());
</script>
<script type="module" src="/game-app/main.js"></script>
</body>
</html>
