<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Anime Music Quiz - DBS</title>
    <script>
        if (!localStorage.getItem('token')) {
            const next = `${window.location.pathname}${window.location.search || ''}`;
            window.location.replace(`/login?next=${encodeURIComponent(next)}`);
        }
    </script>
    <link rel="stylesheet" href="/style.css"/>
    <link rel="stylesheet" href="/game-app/assets/game-client.css"/>
    <style>
        body { visibility: hidden; }
    </style>
</head>
<body class="page">

<main class="main-content">
    <div id="game-root">
        <p style="color: var(--text-muted);">Loading game client...</p>
    </div>
</main>

<script src="/auth.js"></script>
<script src="/navbar.js?v=malfix2"></script>
<script>
    document.body.style.visibility = 'visible';
    renderNavbar();

    const cachedUser = auth.getUser();
    if (cachedUser) updateNavbarUI(cachedUser);

    apiFetch('/auth/me').then(freshUser => {
        auth.save(auth.getToken(), freshUser);
        updateNavbarUI(freshUser);
    }).catch(() => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        const next = `${window.location.pathname}${window.location.search || ''}`;
        window.location.replace(`/login?next=${encodeURIComponent(next)}`);
    });
</script>
<script type="module" src="/game-app/main.js"></script>
</body>
</html>
